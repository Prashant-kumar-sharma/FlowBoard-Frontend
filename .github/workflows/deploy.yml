name: Frontend Deploy

on:
  push:
    branches:
      - main
      - dev
      - feature/**
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: docker.io
  IMAGE_NAME: prashar85211/flowboard-frontend

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run unit tests
        run: npm run test:coverage -- --watch=false --browsers=ChromeHeadless

      - name: Build production app
        run: npm run build

  build-and-push:
    runs-on: ubuntu-latest
    needs: test-and-build

    steps:
      - name: Skip image publish outside main
        if: ${{ github.event_name == 'pull_request' || github.ref != 'refs/heads/main' }}
        run: echo "Skipping Docker image build and push because this run is not for a push on main."

      - name: Checkout code
        if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
        env:
          IMAGE_SHA_TAG: sha-${{ github.sha }}
        run: |
          docker buildx build \
            --file ./Dockerfile \
            --tag "${REGISTRY}/${IMAGE_NAME}:latest" \
            --tag "${REGISTRY}/${IMAGE_NAME}:${IMAGE_SHA_TAG}" \
            --push \
            .

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Skip deploy outside main
        if: ${{ github.event_name == 'pull_request' || github.ref != 'refs/heads/main' }}
        run: echo "Skipping EC2 deploy because this run is not for a push on main."

      - name: Deploy frontend service on EC2
        if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.SERVER_APP_PATH }}"
            docker compose pull frontend
            docker compose up -d --no-build frontend
